[global]

   # Nombre del grupo de trabajo SMB.
   # Debe coincidir con el workgroup de los PCs Windows para que se vean en red.
   workgroup = WORKGROUP

   # Descripción del servidor.
   # Se muestra en el explorador de red de Windows.
   server string = Servidor Jupiter Files

   # Modo de seguridad: cada usuario debe autenticarse con usuario/clave.
   security = user

   # Si un usuario no existe en Samba, se mapea como guest.
   # Útil para evitar errores de autenticación ruidosos.
   map to guest = bad user


   # -------------------------------
   # LOGGING & AUDITORIA (Requisito 3)
   # -------------------------------

   # Nivel de log básico (1 = errores importantes).
   #MODIFICAMOS PARA DEBUGGEAR
   log level = 3 

   # Uso de syslog.
   # 0 = usar configuración por defecto de Samba.
   syslog = 0

   # Archivo de log por cliente.
   # %m = nombre del host que se conecta.
   log file = /var/log/samba/log.%m

   # Tamaño máximo del log en KB antes de rotar.
   max log size = 1000



# ===============================
# RECURSO: CONTABILIDAD
# ===============================
[Contabilidad]

   # Descripción del recurso compartido.
   comment = Documentos Contables

   # Ruta real en el sistema Linux.
   path = /srv/samba/contabilidad


   # -------------------------------
   # SEGURIDAD (Requisito 1 y 2)
   # -------------------------------

   # Solo usuarios del grupo Linux "contadores" pueden autenticarse.
   valid users = @contadores

   # Por defecto el recurso es escribible.
   writable = yes

   # El usuario "ana" solo puede leer (override del permiso general).
   read list = ana


   # -------------------------------
   # PERMISOS FORZADOS
   # -------------------------------

   # Permisos para archivos nuevos: rwxrwx---
   create mask = 0770

   # Permisos para directorios nuevos: rwxrws---
   # El bit SetGID (2) fuerza herencia del grupo.
   directory mask = 2770

   # Todo archivo nuevo hereda el grupo "contadores".
   force group = contadores


   # -------------------------------
   # AUDITORIA DE ELIMINACION
   # -------------------------------

   # Activamos el módulo VFS de auditoría.
   #vfs objects = full_audit

   # Eventos que se registran correctamente.
   # mkdir   = crear directorios
   # rename  = renombrar
   # unlink  = borrar archivos
   # rmdir   = borrar directorios
   # pwrite  = escritura en archivos
   #full_audit:success = mkdir rename unlink rmdir pwrite

   # Formato del log:
   # %u = usuario
   # %I = IP
   # %S = nombre del recurso
   #full_audit:prefix = %u|%I|%S

   # No registramos fallos en este ejemplo.
   #full_audit:failure = none

   # Facility syslog dedicada para auditoría Samba.
   #full_audit:facility = local7



# ===============================
# RECURSO: GERENCIA
# ===============================
[Gerencia]

   # Descripción visible en la red.
   comment = Documentos Gerenciales Privados

   # Ruta real en Linux.
   path = /srv/samba/gerencia

   # Solo usuarios del grupo Linux "gerentes".
   valid users = @gerentes

   # Permite escritura.
   writable = yes

   # Permisos archivos nuevos: rwxrwx---
   create mask = 0770

   # Permisos directorios nuevos con SetGID.
   directory mask = 2770

   # Forzamos grupo "gerentes" en archivos nuevos.
   force group = gerentes
